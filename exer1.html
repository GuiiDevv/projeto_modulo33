<!DOCTYPE html>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 1</title>
    <style>
        h1 {
            text-align: center; /* Centraliza o título */
        }
        body {
            background-color: #000000;
            margin: 0 auto; /* Remove margem padrão */
        }
        .menu {
            background-color: rgb(32, 0, 91);
            padding: 3px; /* Adiciona um pouco de espaço interno ao menu */
            width: 100%; /* Ocupa toda a largura */
            box-sizing: border-box; /* Inclui padding na largura total */
            margin: 0; /* Remove margem padrão */
        }
        .menu ul {
            list-style-type: none; /* Remove os marcadores da lista */
            padding: 0; /* Remove o preenchimento */
            display: flex; /* Exibe os itens em linha */
            justify-content: center; /* Centraliza os itens horizontalmente */
        }
        .menu li {
            margin: 0 15px; /* Adiciona espaço entre os itens */
        }
        .external-link {
        display: block; /* Exibe o link como um bloco para facilitar a centralização */
        margin: 0 auto; /* Centraliza o link horizontalmente */
        width: fit-content; /* ou uma largura fixa */
        margin-top: 20px; /* Adiciona um pouco de espaço acima do link */
        }
 
    </style>
</head>
<body>
    <h1>Interface de Navegação</h1>
    <nav class="menu">  <!-- Menu de navegação -->
