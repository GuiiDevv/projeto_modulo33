<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela simples</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        th, td {
        padding: 0 30px 0 0;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <th>Nome</th>
            <th>Idade</th>
        </tr>

        <tr>
            <td>Ana Silva</td>
            <td class="idade">30</td>
        </tr>
        <tr>
            <td>João Santos</td>
            <td class="idade">25</td>
        </tr>

        <tr>
            <td>Maria Oliveira</td>
            <td class="idade">28</td>
        </tr>
    </table>
</body>
