    <h1>Homem-Aranha - 1º Filme da trilogia</h1>
    <figure>
        <img src="spider-man-trilogy-c0ug8grui5erlci4.jpg" srcset="spider-man-trilogy-c0ug8grui5erlci4.jpg 500w, spider-man-trilogy-c0ug8grui5erlci4.jpg 1000w" alt="Poster do filme Homem-Aranha de 2002" title="Poster do filme Homem-Aranha de 2002" width="800">
        <figcaption>
            <h2> Informacoes Gerais:</h2>
            <ul>
                <li>Titulo original: Spider-Man</li>
                <li>Lançamento: 3 de maio de 2002 (EUA) / 17 de maio de 2002 (Brasil)</li>
                <li>Diretor: Sam Raimi</li>
                <li>Roteiro: David Koepp</li>
                <li>Produtora: Columbia Pictures/Marvel Studios</li>
                <li>Elenco principal:
                    <ul>
                        <li>Tobey Maguire: Peter Parker / Homem-Aranha</li>
                        <li>Kirsten Dunst: Mary Jane Watson</li>
                        <li>Willem Dafoe: Norman Osborn / Duende Verde</li>
                        <li>James Franco: Harry Osborn</li>
                        <li>Rosemary Harris: Tia May</li>
                        <li>Cliff Robertson: Tio Ben</li>
                    </ul>
                </li>
            </ul> 
        </figcaption>
        <img src="tobey-maguire.jpg" srcset="tobey-maguire.jpg 500w, tobey-maguire.jpg 1000w" alt="Tobey Maguire como Peter Parker" title="Tobey Maguire como Peter Parker" width="800">
        <figcaption> Peter Parker é um jovem tímido e estudioso que vive com os tios Ben e May. Após ser picado por uma aranha geneticamente modificada, ele ganha poderes sobre-humanos: força, agilidade e a capacidade de escalar paredes. Inicialmente, Peter usa suas habilidades de forma irresponsável, mas a morte trágica do tio Ben o faz compreender que “com grandes poderes vêm grandes responsabilidades”.<br><br>
                     Enquanto tenta equilibrar sua vida pessoal e acadêmica, Peter enfrenta Norman Osborn, empresário poderoso que, após um experimento mal sucedido, se transforma no vilão Duende Verde. A batalha entre os dois coloca em risco não apenas Nova York, mas também Mary Jane, o grande amor de Peter.<br><br>
        </figcaption>
    </figure>
